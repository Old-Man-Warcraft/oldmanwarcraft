[worldserver]

###################################################################################################
#    WEEKEND XP MODULE
###################################################################################################
#
#    WeekendXP.Enable
#        Description: Enable weekend double XP bonus
#        Default:     1 (enabled)
#                     0 (disabled)

WeekendXP.Enable = 1

#
#    WeekendXP.Multiplier
#        Description: XP multiplier during weekend (2.0 = double XP)
#        Default:     2.0

WeekendXP.Multiplier = 2.0

#
#    WeekendXP.StartDay
#        Description: Day of week when weekend XP starts (0 = Sunday, 6 = Saturday)
#        Default:     5 (Friday)

WeekendXP.StartDay = 5

#
#    WeekendXP.EndDay
#        Description: Day of week when weekend XP ends (0 = Sunday, 6 = Saturday)
#        Default:     0 (Sunday)

WeekendXP.EndDay = 0

#
#    WeekendXP.StartHour
#        Description: Hour when weekend XP starts (0-23, server time)
#        Default:     18 (6 PM)

WeekendXP.StartHour = 18

#
#    WeekendXP.EndHour
#        Description: Hour when weekend XP ends (0-23, server time)
#        Default:     23 (11 PM)

WeekendXP.EndHour = 23

#
#    WeekendXP.AnnounceLogin
#        Description: Announce weekend XP status to players on login
#        Default:     1 (enabled)
#                     0 (disabled)

WeekendXP.AnnounceLogin = 1

#
###################################################################################################
