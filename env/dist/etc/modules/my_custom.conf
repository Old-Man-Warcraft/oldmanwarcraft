[worldserver]

########################################
# Welcome Mail Module Configuration
########################################
#
#    WelcomeMail.Enable
#        Description: Enable the welcome mail system for new characters
#        Default:     1 - Enabled
#                     0 - Disabled
#

WelcomeMail.Enable = 1

#
#    WelcomeMail.GoldAmount
#        Description: Amount of gold to send in copper (10000 copper = 1 gold)
#        Default:     10000 (1 gold)
#

WelcomeMail.GoldAmount = 10000

#
#    WelcomeMail.Subject
#        Description: Subject line of the welcome mail
#        Default:     "Welcome to Our Server!"
#

WelcomeMail.Subject = "Welcome to Our Server!"

#
#    WelcomeMail.Body
#        Description: Body text of the welcome mail (use \n for new lines)
#        Default:     A default welcome message
#

WelcomeMail.Body = "Welcome to our server!\n\nWe're excited to have you join our community. Here are some of the features we offer:\n\n- Custom content and quests\n- Active community and events\n- Regular updates and improvements\n- Friendly and helpful staff\n- Custom modules including Playerbots, Transmog, and more!\n\nEnjoy your adventure and have fun!\n\n- The Server Team"

#
#    WelcomeMail.ShowNotification
#        Description: Show a chat notification when the welcome mail is sent
#        Default:     1 - Enabled
#                     0 - Disabled
#

WelcomeMail.ShowNotification = 1
