#                                   1 (WEATHER_TYPE_RAIN) - Rain
#                                   2 (WEATHER_TYPE_SNOW) - Snow
#                                   3 (WEATHER_TYPE_STORM) - Storm
#        Default:     3 (WEATHER_TYPE_STORM)
CitySiege.Weather.Type = 3

#
#    CitySiege.Weather.Grade
#        Description: Weather intensity grade (0.0 to 1.0).
#                     0.0 = No weather effect, 1.0 = Maximum weather intensity
#                     Example: 0.5 = Moderate rain/snow/storm
#        Default:     1.0 (maximum intensity)
CitySiege.Weather.Grade = 1.0

