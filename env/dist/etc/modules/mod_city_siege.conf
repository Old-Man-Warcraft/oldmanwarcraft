###############################################
# Reward Settings
###############################################

#
#    CitySiege.RewardOnDefense
#        Description: Enable rewards for players who defend the city.
#        Default:     1 (enabled)
#                     Valid values: 0 (disabled) / 1 (enabled)
CitySiege.RewardOnDefense = 1

#
#    CitySiege.RewardHonor
#        Description: Amount of honor points to award for successful defense.
#        Default:     100
CitySiege.RewardHonor = 100

#
#    CitySiege.RewardGoldBase
#        Description: Base amount of gold (in copper) to award for successful defense at level 1.
#                     This is the starting amount before level scaling is applied.
#        Default:     5000 (50 silver)
CitySiege.RewardGoldBase = 5000

#
#    CitySiege.RewardGoldPerLevel
#        Description: Additional gold (in copper) per player level for defense rewards.
#                     Total gold = RewardGoldBase + (RewardGoldPerLevel * player level)
#                     Example: Level 80 player = 5000 + (5000 * 80) = 405,000 copper (40.5 gold)
#        Default:     5000 (0.5 gold per level)
CitySiege.RewardGoldPerLevel = 5000

