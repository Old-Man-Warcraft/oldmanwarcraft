#    CitySiege.Respawn.MiniBossTime
#        Description: Respawn time (in seconds) for siege mini-bosses.
#        Default:     180 (3 minutes)
CitySiege.Respawn.MiniBossTime = 180

#
#    CitySiege.Respawn.EliteTime
#        Description: Respawn time (in seconds) for siege elites.
#        Default:     120 (2 minutes)
CitySiege.Respawn.EliteTime = 120

