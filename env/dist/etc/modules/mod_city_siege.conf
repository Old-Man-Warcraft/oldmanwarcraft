###############################################
# Creature Entry Configurations
###############################################
# These define which creature entries to use for siege forces.
# Attacking faction leaders are now randomly selected from opposing faction city leader pools for variety.
# Each siege will feature a different opposing faction leader leading the attack.
#
# Alliance attackers spawn Footmen, Knights, Riflemen, and a random Horde city leader.
# Horde attackers spawn Grunts, Tauren Warriors, Headhunters, and a random Alliance city leader.
#
# Leader pools (randomly selected per siege):
#   Alliance City Leaders: King Varian Wrynn (29611), King Magni Bronzebeard (2784),
#                          Tyrande Whisperwind (7999), Prophet Velen (17468)
#   Horde City Leaders: Thrall (4949), Cairne Bloodhoof (3057),
#                       Lady Sylvanas Windrunner (10181), Lor'themar Theron (16802)

#
#    CitySiege.Creature.Alliance.Minion
#        Description: Creature entry for Alliance city attackers (regular minions).
#        Default:     17919 (Alliance Footman from Mount Hyjal)
CitySiege.Creature.Alliance.Minion = 17919

#
#    CitySiege.Creature.Alliance.Elite
#        Description: Creature entry for Alliance city attackers (elites).
#        Default:     17920 (Alliance Knight from Mount Hyjal)
