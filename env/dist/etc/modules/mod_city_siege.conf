[worldserver]

##############################################
# mod-city-siege configuration
##############################################
#
#    CitySiege.Enabled
#        Description: Enables the City Siege module.
#        Default:     1 (enabled)
#                     Valid values: 0 (disabled) / 1 (enabled)
CitySiege.Enabled = 1

#
#    CitySiege.DebugMode
#        Description: Enables debug logging for the City Siege module.
#        Default:     0 (disabled)
#                     Valid values: 0 (disabled) / 1 (enabled)
CitySiege.DebugMode = 0

#
#    CitySiege.TimerMin
#        Description: Minimum time (in minutes) between city siege events.
#        Default:     120 (2 hours)
CitySiege.TimerMin = 120

#
#    CitySiege.TimerMax
#        Description: Maximum time (in minutes) between city siege events.
#        Default:     240 (4 hours)
CitySiege.TimerMax = 240

#
#    CitySiege.EventDuration
#        Description: Duration (in minutes) of each siege event.
#        Default:     30
CitySiege.EventDuration = 30

#
#    CitySiege.AllowMultipleCities
#        Description: Allow siege events in multiple cities at the same time.
#        Default:     0 (only one city at a time)
#                     Valid values: 0 (single) / 1 (multiple)
CitySiege.AllowMultipleCities = 0

#
#    CitySiege.AnnounceRadius
#        Description: Radius (in yards) for announcing siege events to nearby players.
#                     Set to 0 to announce to the entire world.
#        Default:     1500
CitySiege.AnnounceRadius = 1500

#
#    CitySiege.MinimumLevel
#        Description: Minimum player level to participate in siege events.
#        Default:     1
CitySiege.MinimumLevel = 1

