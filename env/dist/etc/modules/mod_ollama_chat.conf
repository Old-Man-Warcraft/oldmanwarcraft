# --------------------------------------------
# RAG (Retrieval-Augmented Generation) SYSTEM
# --------------------------------------------

# OllamaChat.EnableRAG
#     Description: Enable or disable the RAG (Retrieval-Augmented Generation) feature.
#                  When enabled, the bot will analyze player messages and retrieve relevant information
#                  from JSON knowledge base files to provide more accurate and detailed responses.
#     Default:     0 (false)
OllamaChat.EnableRAG = 1



# OllamaChat.RAGDataPath
#     Description: Path to the directory containing RAG JSON data files.
#                  This should be a relative path from the server's working directory.
#                  For AzerothCore installations, this is typically ../../../modules/mod-ollama-chat/data/rag/
#                  The system will load all .json files from this directory.
#     Default:     ../../../modules/mod-ollama-chat/data/rag/
OllamaChat.RAGDataPath = ../../../modules/mod-ollama-chat/data/rag/



# OllamaChat.RAGMaxRetrievedItems
#     Description: Maximum number of relevant information items to retrieve and include in the prompt.
#                  Higher values provide more context but may exceed token limits.
#     Default:     3
OllamaChat.RAGMaxRetrievedItems = 3



# OllamaChat.RAGSimilarityThreshold
#     Description: Minimum similarity score (0.0-1.0) required for information to be considered relevant.
#                  Lower values will include more information but may be less accurate.
#                  Higher values will be more precise but may miss relevant information.
#                  Recommended range: 0.2-0.4 for good balance of relevance and coverage.
#     Default:     0.3
OllamaChat.RAGSimilarityThreshold = 0.3



# OllamaChat.RAGPromptTemplate
#     Description: Template for including RAG information in bot prompts.
#     Placeholders (named): {rag_info}
OllamaChat.RAGPromptTemplate = "RELEVANT INFORMATION:\n{rag_info}\nUse this information to provide accurate and detailed responses when applicable."

# OllamaChat.RAGQdrantEnabled
#     Description: Enable Qdrant-backed vector retrieval for RAG.
#                  When enabled, the module embeds JSON RAG entries, syncs them to Qdrant,
#                  and queries Qdrant before falling back to local similarity search.
#                  Current setup assumption: Qdrant runs on the same LAN host as LiteLLM.
#     Default:     0
OllamaChat.RAGQdrantEnabled = 1

# OllamaChat.RAGQdrantUrl
#     Description: Base URL for the Qdrant server.
#                  Example: http://127.0.0.1:6333
#     Default:     (empty)
OllamaChat.RAGQdrantUrl = http://10.10.20.31:6333

# OllamaChat.RAGQdrantApiKey
#     Description: Optional Qdrant API key sent as the api-key header.
#     Default:     (empty)
OllamaChat.RAGQdrantApiKey =

# OllamaChat.RAGQdrantCollectionName
#     Description: Qdrant collection used for mod-ollama-chat RAG payloads.
#     Default:     mod_ollama_chat_rag
OllamaChat.RAGQdrantCollectionName = mod_ollama_chat_rag

# OllamaChat.RAGQdrantVectorSize
#     Description: Explicit vector dimension for the Qdrant collection.
#                  Set to 0 to infer the size from the first embeddings response.
#     Default:     0
OllamaChat.RAGQdrantVectorSize = 0

# OllamaChat.RAGQdrantDistance
#     Description: Qdrant distance metric used when creating the collection.
#                  Common values: Cosine, Dot, Euclid.
#     Default:     Cosine
OllamaChat.RAGQdrantDistance = Cosine

# OllamaChat.RAGQdrantSyncOnStartup
#     Description: Sync the JSON knowledge base into Qdrant during startup and reload.
#                  Disable only if the collection is maintained externally.
#     Default:     1
OllamaChat.RAGQdrantSyncOnStartup = 0

# OllamaChat.RAGQdrantBatchSize
#     Description: Number of RAG entries to embed and upsert per batch.
#     Default:     16
OllamaChat.RAGQdrantBatchSize = 16

# OllamaChat.RAGEmbeddingApiUrl
#     Description: OpenAI-compatible embeddings endpoint used for Qdrant sync and search.
#                  Example: http://127.0.0.1:4000/v1/embeddings
#                  This matches the same remote LiteLLM host used for chat completions.
#     Default:     (empty)
OllamaChat.RAGEmbeddingApiUrl = http://10.10.20.21:4000/v1/embeddings

# OllamaChat.RAGEmbeddingApiKey
#     Description: Bearer token for the embeddings endpoint.
#     Default:     (empty)
OllamaChat.RAGEmbeddingApiKey = sk-s6QvzeOVf1DMk6QioIYY8A

# OllamaChat.RAGEmbeddingModel
#     Description: Model identifier sent to the embeddings endpoint.
