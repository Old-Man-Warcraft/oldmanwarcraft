[worldserver]

########################################
# Goblin Bank
########################################
#    GoblinBank.Enable
#        Description: Enable the Goblin Bank module.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Enable = 1

#    GoblinBank.Announce
#        Description: Show a login message when the module is enabled.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Announce = 1

#    GoblinBank.MinLevel
#        Description: Minimum player level required to take a loan.
#        Default:     20
#
GoblinBank.MinLevel = 20

#    GoblinBank.MinLoanCopper
#        Description: Minimum loan amount in copper.
#        Default:     100000 - 10 gold
#
GoblinBank.MinLoanCopper = 100000

#    GoblinBank.MaxLoanCopper
#        Description: Maximum loan amount in copper.
#        Default:     10000000 - 1000 gold
#
GoblinBank.MaxLoanCopper = 10000000

#    GoblinBank.AllowDailyPayments
#        Description: Allow daily installment loans.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.AllowDailyPayments = 1

#    GoblinBank.AllowWeeklyPayments
#        Description: Allow weekly installment loans.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.AllowWeeklyPayments = 1

#    GoblinBank.AllowLumpSumPayments
#        Description: Allow a single repayment at the due date.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.AllowLumpSumPayments = 1

#    GoblinBank.DailyPeriods
#        Description: Number of daily installments in a daily-payment loan.
#        Default:     7
#
GoblinBank.DailyPeriods = 7

#    GoblinBank.WeeklyPeriods
#        Description: Number of weekly installments in a weekly-payment loan.
#        Default:     4
#
GoblinBank.WeeklyPeriods = 4

#    GoblinBank.LumpSumDays
#        Description: Days before a lump-sum loan comes due.
#        Default:     14
#
GoblinBank.LumpSumDays = 14

#    GoblinBank.GracePeriodDays
#        Description: Extra days after a missed payment before default.
#        Default:     3
#
GoblinBank.GracePeriodDays = 3

#    GoblinBank.Interest.Model
#        Description: Interest model to use for newly created loans.
#        Default:     0 - Simple interest
#                     1 - Accruing interest per payment period
#
GoblinBank.Interest.Model = 0

#    GoblinBank.Interest.SimpleRatePct
#        Description: Percentage applied once to the full principal when using simple interest.
#        Default:     10.0
#
GoblinBank.Interest.SimpleRatePct = 10.0

#    GoblinBank.Interest.AccruingRatePct
#        Description: Percentage applied each payment period when using accruing interest.
#        Default:     5.0
#
GoblinBank.Interest.AccruingRatePct = 5.0

#    GoblinBank.BadCredit.DenyNewLoans
#        Description: Prevent characters with bad credit from taking new loans.
#        Default:     1 - Deny new loans
#                     0 - Allow new loans
#
GoblinBank.BadCredit.DenyNewLoans = 1

#    GoblinBank.BadCredit.MaxLoanPct
#        Description: If bad-credit players are allowed to borrow, reduce their max loan to this percent.
#        Default:     50.0
#
GoblinBank.BadCredit.MaxLoanPct = 50.0

#    GoblinBank.Punishment.RunSpeed.Enable
#        Description: Apply a movement-speed penalty while the player is in default.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Punishment.RunSpeed.Enable = 1

#    GoblinBank.Punishment.RunSpeed.Multiplier
#        Description: Run-speed multiplier while defaulted.
#        Default:     0.60
#
GoblinBank.Punishment.RunSpeed.Multiplier = 0.60

#    GoblinBank.Punishment.XP.Enable
#        Description: Reduce XP gains while defaulted.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Punishment.XP.Enable = 1

#    GoblinBank.Punishment.XP.Multiplier
#        Description: XP multiplier applied while defaulted and under level 80.
#        Default:     0.50
#
GoblinBank.Punishment.XP.Multiplier = 0.50

#    GoblinBank.Punishment.MoneyLoot.Enable
#        Description: Prevent money loot while defaulted.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Punishment.MoneyLoot.Enable = 1

#    GoblinBank.Punishment.ItemLoot.Enable
#        Description: Destroy looted items while defaulted.
#        Default:     1 - Enabled
#                     0 - Disabled
#
GoblinBank.Punishment.ItemLoot.Enable = 1

#    GoblinBank.Punishment.BlockMailAuction.Enable
#        Description: Block outgoing mail and auction bids while defaulted.
#        Default:     0 - Disabled
#                     1 - Enabled
#
GoblinBank.Punishment.BlockMailAuction.Enable = 0

#    GoblinBank.Processing.TickSeconds
#        Description: Interval in seconds for overdue-loan reconciliation.
#        Default:     60
#
GoblinBank.Processing.TickSeconds = 60

#    GoblinBank.NPC.Entry
#        Description: Reserved NPC entry for the Goblin banker gossip script.
#        Default:     991000
#
GoblinBank.NPC.Entry = 991000