name: "Issue Tags and Project Routing"

on:
  issues:
    types:
      - opened
      - edited
      - reopened
      - labeled

permissions:
  contents: read
  issues: write
  repository-projects: write

jobs:
  route_issue:
    if: github.repository == 'mod-playerbots/azerothcore-wotlk'
    runs-on: ubuntu-latest
    steps:
      - name: Sync routing labels from issue tags
        id: route
        uses: actions/github-script@v7
        with:
          script: |
            const knownLabels = [
              'Levels 1-20',
              'Levels 21-40',
              'Levels 41-60',
              'Levels 61-80',
              'Dungeons',
              'Raids'
            ];

            const issue = context.payload.issue;
            const body = issue.body || '';
            const existingLabels = new Set((issue.labels || []).map(label => typeof label === 'string' ? label : label.name));
            const desiredLabels = new Set();

            for (const label of knownLabels)
            {
              const escapedLabel = label.replace(/[.*+?^()|[\]\\]/g, '\\$&');
              const checkboxPattern = new RegExp(`-\\s+\\[[xX]\\]\\s+${escapedLabel}`, 'm');
              if (checkboxPattern.test(body) || existingLabels.has(label))
                desiredLabels.add(label);
            }

            const preservedLabels = [...existingLabels].filter(label => !knownLabels.includes(label));
            const finalLabels = [...new Set([...preservedLabels, ...desiredLabels])];

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: finalLabels
            });

            for (const label of knownLabels)
            {
              const outputName = label.toLowerCase().replace(/[^a-z0-9]+/g, '_').replace(/^_|_$/g, '');
              core.setOutput(outputName, desiredLabels.has(label) ? 'true' : 'false');
            }

      # Configure these repository variables with full project URLs:
      # - OMW_PROJECT_LEVELS_1_20_URL
      # - OMW_PROJECT_LEVELS_21_40_URL
      # - OMW_PROJECT_LEVELS_41_60_URL
      # - OMW_PROJECT_LEVELS_61_80_URL
      # - OMW_PROJECT_DUNGEONS_URL
      # - OMW_PROJECT_RAIDS_URL

      - name: Add to Levels 1-20 project
        if: steps.route.outputs.levels_1_20 == 'true' && vars.OMW_PROJECT_LEVELS_1_20_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_LEVELS_1_20_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Levels 21-40 project
        if: steps.route.outputs.levels_21_40 == 'true' && vars.OMW_PROJECT_LEVELS_21_40_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_LEVELS_21_40_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Levels 41-60 project
        if: steps.route.outputs.levels_41_60 == 'true' && vars.OMW_PROJECT_LEVELS_41_60_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_LEVELS_41_60_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Levels 61-80 project
        if: steps.route.outputs.levels_61_80 == 'true' && vars.OMW_PROJECT_LEVELS_61_80_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_LEVELS_61_80_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Dungeons project
        if: steps.route.outputs.dungeons == 'true' && vars.OMW_PROJECT_DUNGEONS_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_DUNGEONS_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add to Raids project
        if: steps.route.outputs.raids == 'true' && vars.OMW_PROJECT_RAIDS_URL != ''
        uses: actions/add-to-project@v1.0.2
        with:
          project-url: ${{ vars.OMW_PROJECT_RAIDS_URL }}
          github-token: ${{ secrets.GITHUB_TOKEN }}