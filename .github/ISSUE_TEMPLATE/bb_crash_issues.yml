name: Disconnect / crash / realm outage report
description: Report disconnect loops, apparent server crashes, or realm outages affecting players.
title: "[Crash/Disconnect]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for player-visible crashes, disconnect loops, or sudden realm outages.

        If your report includes account-specific details, redact them first or use the support center instead.
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: |
        Describe what you were doing just before the disconnect or crash.
      placeholder: |
        1. Zone / dungeon / battleground
        2. Action taken just before the issue
        3. What the client/server did next
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: |
        Tell us what you expected instead.
    validations:
      required: true
  - type: input
    id: character
    attributes:
      label: Character name(s)
      description: One or more characters affected.
      placeholder: Example: Thrallina, Botmage
    validations:
      required: false
  - type: input
    id: location
    attributes:
      label: Zone / instance / battleground
      description: Where it happened.
      placeholder: Icecrown, Utgarde Keep, Warsong Gulch, etc.
    validations:
      required: false
  - type: input
    id: occurred_at
    attributes:
      label: Approximate date and time
      description: When did this happen?
      placeholder: 2026-04-26 around 20:15 server time
    validations:
      required: false
  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Intermittently
        - Happened once
        - Realm was fully offline
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Logs and Screenshots
      description: |
        Paste links to screenshots, clips, Discord uploads, or any visible errors.
        If staff asks for logs later, link them in a follow-up comment.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional Context
      description: |
        Anything else that might help us narrow this down?
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Thank you for reporting this. Timing, location, and a short clip are often enough to turn “it exploded” into “we found it.”
