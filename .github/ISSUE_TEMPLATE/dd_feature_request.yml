name: Suggestion / feature request
description: Suggest an improvement for the Old Man Warcraft player experience.
title: "[Suggestion]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing an idea.

        Good suggestions explain the player problem first, then the proposed solution.
  - type: textarea
    id: description
    attributes:
      label: What would you like to see changed?
      description: |
        Describe the idea and the player-facing result you want.
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: |
        Explain the pain point, frustration, or missed opportunity behind the suggestion.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Suggested implementation
      description: |
        Optional: describe how you think this could work in practice.
    validations:
      required: false
  - type: textarea
    id: examples
    attributes:
      label: Examples or references
      description: |
        Optional: link examples from other realms, games, patch notes, or mockups.
    validations:
      required: false
  - type: textarea
    id: additional
    attributes:
      label: Additional context
      description: |
        Add any extra notes, screenshots, or edge cases here.
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Suggestions are easier to act on when they are scoped, specific, and tied to actual player experience.
