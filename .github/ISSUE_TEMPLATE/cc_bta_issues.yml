name: Account / connection / website issue
description: Report public-facing technical problems outside normal gameplay.
title: "[Support/Service]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this template for login failures, broken website pages, connection problems, or public support tooling bugs.

        Please do not include passwords, email addresses, payment details, or other sensitive information.
  - type: dropdown
    id: category
    attributes:
      label: Issue type
      options:
        - "Login / realm list"
        - "Website page or form"
        - "Support center"
        - "Shop / donation flow"
        - "Connection guide / launcher setup"
        - "Other"
    validations:
      required: true
  - type: textarea
    id: current
    attributes:
      label: Current behaviour
      description: What is happening, and how can someone else reproduce it?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
      description: What should happen instead?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs and screenshots
      description: Share screenshots, browser error text, or screen recordings if available.
    validations:
      required: false
  - type: input
    id: occurred_at
    attributes:
      label: Approximate date and time
      placeholder: 2026-04-26 around 20:15 server time
    validations:
      required: false
  - type: input
    id: device
    attributes:
      label: Device / browser / client info
      description: Helpful for connection or website issues.
      placeholder: "Windows 11 + Chrome 135, macOS Safari, WoW 3.3.5a client, etc."
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Any other details that might help?
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        If your problem involves private account details, please move it to the support center after opening the report.
