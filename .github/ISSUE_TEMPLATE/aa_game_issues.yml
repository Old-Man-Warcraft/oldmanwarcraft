name: Gameplay bug report
description: Report a reproducible in-game issue on Old Man Warcraft.
title: "[Bug]: "
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve Old Man Warcraft.

        Before opening a new issue:
        - Search existing issues first so we can keep reports consolidated.
        - Use the support center for private account or payment matters.
        - Do **not** post passwords, email addresses, IPs, or other sensitive information.
  - type: input
    id: character
    attributes:
      label: Character name
      description: The character that experienced the problem.
      placeholder: Example: Thrallina
    validations:
      required: false
  - type: dropdown
    id: category
    attributes:
      label: Area affected
      description: Pick the closest gameplay category.
      options:
        - Quest
        - NPC / Creature
        - Spell / Talent / Glyph
        - Item / Loot
        - Dungeon / Raid
        - Battleground / Arena / PvP
        - Profession
        - Playerbot behavior
        - Custom OMW system
        - Other
    validations:
      required: true
  - type: textarea
    id: current_behavior
    attributes:
      label: Current Behaviour
      description: |
        What is happening right now?
        Include names/IDs for affected quests, spells, NPCs, items, maps, achievements, or systems when possible.
    validations:
      required: true
  - type: textarea
    id: expected_behavior
    attributes:
      label: Expected Behaviour
      description: |
        What should happen instead?
    validations:
      required: true
  - type: textarea
    id: source
    attributes:
      label: Source
      description: |
        Optional: links to Wowhead, videos, old patch notes, screenshots, or other references that show the intended behavior.
    validations:
      required: false
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: |
        What does someone else need to do to reproduce the bug?
      placeholder: |
        1. Step 1
        2. Step 2
        3. Step 3
    validations:
      required: true
  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Always
        - Often
        - Sometimes
        - Only happened once
    validations:
      required: true
  - type: input
    id: occurred_at
    attributes:
      label: Approximate date and time
      description: When did you last observe the issue?
      placeholder: 2026-04-26 around 18:30 server time
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Screenshots / videos / logs
      description: |
        Paste links to screenshots, clips, combat logs, or text snippets that help explain the issue.
      placeholder: |
        https://...
    validations:
      required: false
  - type: input
    id: client_info
    attributes:
      label: Client details
      description: Optional but helpful for UI or addon-related issues.
      placeholder: enUS client, no addons / using ElvUI / etc.
    validations:
      required: false
  - type: textarea
    id: extra_notes
    attributes:
      label: Extra Notes
      description: |
        Anything else that might help us investigate?
      placeholder: |
        None
    validations:
      required: false
  - type: markdown
    attributes:
      value: |
        Thanks again — good reports save a surprising amount of goblin engineering time.
