name: Disconnect / crash / realm outage report
description: Report disconnect loops, apparent server crashes, or realm outages affecting players.
title: "[Crash/Disconnect]: "
body:
  - type: markdown
    attributes:
      value: |
        Use this form for player-visible disconnects, crashes, or realm outages.

        Please do not include passwords, email addresses, payment details, or other sensitive information.
  - type: textarea
    id: happened
    attributes:
      label: What happened?
      description: Describe what you were doing just before the disconnect or crash.
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should have happened?
      description: Tell us what you expected instead.
    validations:
      required: true
  - type: input
    id: character
    attributes:
      label: Character name(s)
      placeholder: Example: Thrallina, Botmage
    validations:
      required: false
  - type: input
    id: location
    attributes:
      label: Zone / instance / battleground
      placeholder: Icecrown, Utgarde Keep, Warsong Gulch, etc.
    validations:
      required: false
  - type: dropdown
    id: frequency
    attributes:
      label: How often does it happen?
      options:
        - Every time
        - Intermittently
        - Happened once
        - Realm was fully offline
    validations:
      required: true
  - type: input
    id: occurred_at
    attributes:
      label: Approximate date and time
      placeholder: 2026-04-26 around 20:15 server time
    validations:
      required: false
  - type: textarea
    id: evidence
    attributes:
      label: Logs and screenshots
      description: Paste any links or text that help explain the issue.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Anything else that might help us narrow this down?
    validations:
      required: false
